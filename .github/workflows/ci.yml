name: CI
on: [push, pull_request]

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run evals
        env:
          COSMOS_CONN: ${{ secrets.COSMOS_CONN }}
          AZURE_OAI_KEY: ${{ secrets.AZURE_OAI_KEY }}
        run: |
          pip install ragas openai azure-cosmos
          python evals/run_evals.py customer-support 2.1.0
          # Exits 1 if relevance < 0.85 — blocks the deploy

  deploy:
    needs: eval-gate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Argo Rollouts
        run: |
          kubectl argo rollouts set image llm-gateway \
            gateway=ghcr.io/YOUR_ORG/llm-platform-gateway:${{ github.sha }}
          kubectl argo rollouts status llm-gateway --timeout=5m