name: Build and Push Images

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: gateway
            port: 8000
          - service: inference
            port: 8001
          - service: prompt_registry
            port: 8002

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/llm-platform-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/llm-platform-${{ matrix.service }}:${{ github.sha }}

  update-azure:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update container apps with new images
        run: |
          for SERVICE in gateway inference prompt_registry; do
            az containerapp update \
              --name llm-platform-${SERVICE//_/-} \
              --resource-group llm-platform-rg \
              --image ghcr.io/${{ github.repository_owner }}/llm-platform-${SERVICE}:${{ github.sha }} \
              --output none
            echo "✓ Updated $SERVICE"
          done