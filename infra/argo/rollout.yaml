# ── Argo Rollouts — Blue/Green deployment for LLM Gateway ─────────────────────
#
# Strategy:
#   1. New image deployed to "green" (preview) service
#   2. AnalysisRun checks p95 latency every 30s for 5 minutes
#   3. If p95 < 2000ms AND error rate < 1% → auto-promote to production
#   4. If either threshold exceeded → auto-abort, traffic stays on "blue"
#
# This means a bad deploy NEVER reaches users — Prometheus catches it first.
#
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: llm-gateway
  namespace: llm-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/YOUR_ORG/llm-platform-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: llm-platform-secrets
                  key: jwt-secret
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
  strategy:
    blueGreen:
      activeService: llm-gateway-active      # production traffic
      previewService: llm-gateway-preview    # new version traffic
      autoPromotionEnabled: false            # manual or analysis-driven
      scaleDownDelaySeconds: 30
      prePromotionAnalysis:
        templates:
          - templateName: latency-and-error-check
        args:
          - name: service-name
            value: llm-gateway-preview
---
# ── Services ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-active
  namespace: llm-platform
spec:
  selector: { app: llm-gateway }
  ports: [{ port: 80, targetPort: 8000 }]
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-preview
  namespace: llm-platform
spec:
  selector: { app: llm-gateway }
  ports: [{ port: 80, targetPort: 8000 }]
---
# ── Analysis Template — blocks promotion if p95 latency spikes ────────────────
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: latency-and-error-check
  namespace: llm-platform
spec:
  args:
    - name: service-name
  metrics:
    # p95 latency must stay under 2 seconds
    - name: p95-latency
      interval: 30s
      failureLimit: 2          # allow 2 bad readings before aborting
      count: 10                # run 10 checks (5 minutes total)
      provider:
        prometheus:
          address: http://prometheus-server.monitoring:9090
          query: |
            histogram_quantile(0.95,
              sum(rate(gateway_latency_ms_bucket{service="{{args.service-name}}"}[1m]))
              by (le)
            )
      successCondition: result[0] < 2000

    # Error rate must stay under 1%
    - name: error-rate
      interval: 30s
      failureLimit: 2
      count: 10
      provider:
        prometheus:
          address: http://prometheus-server.monitoring:9090
          query: |
            sum(rate(gateway_requests_total{service="{{args.service-name}}",status=~"5.."}[1m]))
            /
            sum(rate(gateway_requests_total{service="{{args.service-name}}"}[1m]))
      successCondition: result[0] < 0.01