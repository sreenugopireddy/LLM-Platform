<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LLM Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b12;
  --bg1:#0d1220;
  --bg2:#111827;
  --bg3:#1a2236;
  --border:#1e2d47;
  --border2:#243452;
  --text:#e2eaf8;
  --text2:#7890b8;
  --text3:#3d5278;
  --accent:#3b82f6;
  --accent2:#60a5fa;
  --green:#10b981;
  --amber:#f59e0b;
  --red:#ef4444;
  --purple:#8b5cf6;
  --cyan:#06b6d4;
  --mono:'JetBrains Mono',monospace;
  --sans:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(59,130,246,.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 110%,rgba(139,92,246,.05) 0%,transparent 50%);pointer-events:none;z-index:0}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* inputs */
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:13px;padding:10px 14px;outline:none;transition:border-color .2s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
select option{background:var(--bg2)}

/* buttons */
button{cursor:pointer;border:none;border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:500;padding:9px 18px;transition:all .15s;position:relative;overflow:hidden}
button::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .15s}
button:hover::after{background:rgba(255,255,255,.06)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 20px rgba(59,130,246,.3)}
.btn-primary:hover{box-shadow:0 0 28px rgba(59,130,246,.45)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.2)}

/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.fade-up{animation:fadeUp .4s ease both}
.fade-up-2{animation:fadeUp .4s .08s ease both}
.fade-up-3{animation:fadeUp .4s .16s ease both}
.fade-up-4{animation:fadeUp .4s .24s ease both}

/* layout */
#app{position:relative;z-index:1}
.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

/* login */
.login-wrap{width:100%;max-width:420px}
.login-logo{text-align:center;margin-bottom:40px}
.login-logo .wordmark{font-size:28px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--text) 0%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo .sub{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.15em;text-transform:uppercase;margin-top:6px}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:16px;padding:28px}
.card-title{font-size:14px;font-weight:600;color:var(--text2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
.login-hint{margin-top:20px;background:rgba(59,130,246,.05);border:1px solid rgba(59,130,246,.12);border-radius:10px;padding:14px 16px}
.login-hint-title{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.login-hint-key{font-family:var(--mono);font-size:13px;color:var(--accent2)}
.error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:12px;color:var(--red);margin-bottom:16px}

/* header */
header{position:sticky;top:0;z-index:200;background:rgba(8,11,18,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:20px}
.logo{font-size:15px;font-weight:800;letter-spacing:-.3px}
.logo span{color:var(--accent2)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.nav{display:flex;gap:2px}
.nav-btn{background:transparent;border:none;color:var(--text3);font-size:13px;font-weight:500;padding:6px 14px;border-radius:6px;transition:all .15s}
.nav-btn:hover{color:var(--text2);background:var(--bg3)}
.nav-btn.active{color:var(--text);background:var(--bg3)}
.nav-btn::after{display:none}
.header-right{display:flex;align-items:center;gap:12px}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:6px 12px}
.user-avatar{width:22px;height:22px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.user-name{font-size:12px;font-weight:500}
.user-team{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* main */
main{padding:28px;max-width:1000px;margin:0 auto}

/* metrics */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.metric{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(59,130,246,.03) 0%,transparent 60%)}
.metric-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.metric-value{font-size:24px;font-weight:700;line-height:1}
.metric-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:6px}
.metric-badge{position:absolute;top:14px;right:14px;font-size:18px;opacity:.4}

/* section card */
.section-card{background:var(--bg1);border:1px solid var(--border);border-radius:16px;margin-bottom:16px;overflow:hidden}
.section-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.section-title .icon{opacity:.6}
.section-body{padding:24px}

/* chat */
.chat-messages{min-height:280px;max-height:380px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:4px}
.msg-wrap{display:flex}
.msg-wrap.user{justify-content:flex-end}
.bubble{max-width:72%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.6}
.bubble.user{background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff;border-bottom-right-radius:4px}
.bubble.assistant{background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-bottom-left-radius:4px}
.bubble.system{background:transparent;color:var(--text3);font-family:var(--mono);font-size:12px;text-align:center;align-self:center;border:none;padding:6px}
.bubble.error{background:rgba(239,68,68,.08);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.typing{display:flex;align-items:center;gap:5px;padding:14px 18px;background:var(--bg3);border:1px solid var(--border2);border-radius:14px;border-bottom-left-radius:4px;width:fit-content}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:pulse 1.2s ease infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
.chat-controls{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.chat-input-row{display:flex;gap:8px;margin-top:12px}
.chat-meta{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:8px;display:flex;gap:16px}
.chat-meta span{display:flex;align-items:center;gap:4px}

/* service rows */
.service-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.service-row:last-child{border:none}
.service-name{font-size:14px;font-weight:500}
.service-desc{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;font-weight:500;padding:3px 8px;border-radius:5px;letter-spacing:.05em;text-transform:uppercase}
.badge-green{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.badge-blue{background:rgba(59,130,246,.1);color:var(--accent2);border:1px solid rgba(59,130,246,.2)}
.badge-gray{background:var(--bg3);color:var(--text3);border:1px solid var(--border2)}
.badge-amber{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.badge-purple{background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.2)}
.badge-red{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}

/* code block */
.code-block{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:16px;font-family:var(--mono);font-size:12px;color:var(--text2);overflow-x:auto;line-height:1.7;white-space:pre;position:relative}
.code-copy{position:absolute;top:10px;right:10px;font-size:11px;padding:4px 10px}

/* endpoint table */
.ep-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.ep-row:last-child{border:none}
.ep-left{display:flex;align-items:center;gap:10px}
.method{font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 7px;border-radius:4px;min-width:42px;text-align:center}
.method-post{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.method-get{background:rgba(59,130,246,.1);color:var(--accent2);border:1px solid rgba(59,130,246,.2)}
.ep-path{font-family:var(--mono);font-size:13px;color:var(--text)}
.ep-desc{font-size:12px;color:var(--text3)}

/* highlight cards */
.highlights{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.highlight{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;gap:12px}
.highlight-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.highlight-title{font-size:13px;font-weight:600;margin-bottom:4px}
.highlight-desc{font-family:var(--mono);font-size:11px;color:var(--text3);line-height:1.6}

/* tabs in chat */
.model-pill{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.model-pill.active,.model-pill:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.model-pill::after{display:none}

@media(max-width:700px){
  .metrics{grid-template-columns:1fr 1fr}
  .highlights{grid-template-columns:1fr}
  .nav-btn span{display:none}
  header{padding:0 16px}
  main{padding:16px}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
const GATEWAY = "https://llm-platform-gateway.greentree-67d78498.eastus.azurecontainerapps.io";
let state = { token: null, username: "", teamId: "", tab: "overview", messages: [], model: "gpt-4o-mini", loading: false, health: null, stats: null, requests: 0, cost: 0 };

function $(id){ return document.getElementById(id) }

function render(){
  if(!state.token){ renderLogin(); return; }
  renderApp();
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function renderLogin(){
  $("app").innerHTML = `
  <div class="screen">
    <div class="login-wrap">
      <div class="login-logo fade-up">
        <div class="wordmark">LLM <span>Platform</span></div>
        <div class="sub">Production-grade · Azure deployed</div>
      </div>
      <div class="card fade-up-2">
        <div class="card-title">Sign in</div>
        <div id="login-error"></div>
        <div class="field"><label>Username</label><input id="li-user" value="user_001" placeholder="user_001"/></div>
        <div class="field"><label>Team ID</label><input id="li-team" value="team_acme" placeholder="team_acme"/></div>
        <div class="field"><label>Platform API Key</label><input id="li-key" type="password" placeholder="Enter your platform API key"/></div>
        <button class="btn-primary" style="width:100%;padding:12px;font-size:14px;margin-top:4px" onclick="doLogin()">
          Sign in →
        </button>
        <div class="login-hint">
          <div class="login-hint-title">Default key</div>
          <div class="login-hint-key" onclick="$('li-key').value=this.textContent" style="cursor:pointer" title="Click to fill">llm-platform-key-2024</div>
        </div>
      </div>
    </div>
  </div>`;
  $("li-key").addEventListener("keydown", e => e.key==="Enter" && doLogin());
}

async function doLogin(){
  const u=$("li-user").value.trim(), t=$("li-team").value.trim(), k=$("li-key").value.trim();
  if(!u||!t||!k){showLoginError("All fields required"); return;}
  try{
    const r = await fetch(`${GATEWAY}/auth/token`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,team_id:t,roles:["premium"],api_key:k})});
    const d = await r.json();
    if(d.access_token){ state.token=d.access_token; state.username=u; state.teamId=t; render(); checkHealth(); }
    else showLoginError(d.detail?.error || "Invalid API key");
  }catch(e){ showLoginError("Could not reach gateway — check your connection"); }
}

function showLoginError(msg){
  $("login-error").innerHTML = `<div class="error-box">${msg}</div>`;
}

// ── APP SHELL ─────────────────────────────────────────────────────────────────
function renderApp(){
  const tabs = [{id:"overview",label:"Overview"},{id:"chat",label:"Chat"},{id:"api",label:"API Docs"}];
  $("app").innerHTML = `
  <header>
    <div class="header-left">
      <div class="logo">LLM <span>Platform</span></div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="status-dot" id="status-dot"></div>
        <span style="font-family:var(--mono);font-size:11px;color:var(--text3)" id="status-text">connecting</span>
      </div>
      <nav class="nav">
        ${tabs.map(t=>`<button class="nav-btn ${state.tab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('')}
      </nav>
    </div>
    <div class="header-right">
      <div class="user-chip">
        <div class="user-avatar">${state.username[0]?.toUpperCase()}</div>
        <div><div class="user-name">${state.username}</div><div class="user-team">${state.teamId}</div></div>
      </div>
      <button class="btn-ghost" style="font-size:12px;padding:6px 12px" onclick="logout()">Sign out</button>
    </div>
  </header>
  <main id="main-content"></main>`;
  renderTab();
}

function switchTab(t){ state.tab=t; renderApp(); if(t==="overview")checkHealth(); }
function logout(){ state.token=null; state.messages=[]; render(); }

function renderTab(){
  const c=$("main-content");
  if(state.tab==="overview") c.innerHTML=renderOverview();
  else if(state.tab==="chat") c.innerHTML=renderChat();
  else if(state.tab==="api") c.innerHTML=renderApi();
  attachHandlers();
}

// ── OVERVIEW ──────────────────────────────────────────────────────────────────
function renderOverview(){
  const hok = state.health?.status==="ok";
  return `
  <div class="metrics fade-up">
    <div class="metric">
      <div class="metric-label">Gateway</div>
      <div class="metric-value" style="font-size:16px;color:${hok?'var(--green)':'var(--text3)'}">${hok?'● Online':'● Checking'}</div>
      <div class="metric-sub">Azure Container Apps</div>
      <div class="metric-badge">⚡</div>
    </div>
    <div class="metric">
      <div class="metric-label">Requests</div>
      <div class="metric-value">${state.requests}</div>
      <div class="metric-sub">this session</div>
      <div class="metric-badge">📊</div>
    </div>
    <div class="metric">
      <div class="metric-label">Est. cost</div>
      <div class="metric-value" style="font-size:18px">$${state.cost.toFixed(5)}</div>
      <div class="metric-sub">USD this session</div>
      <div class="metric-badge">💰</div>
    </div>
    <div class="metric">
      <div class="metric-label">Model</div>
      <div class="metric-value" style="font-size:15px">gpt-4.1-mini</div>
      <div class="metric-sub">Azure OpenAI PAYG</div>
      <div class="metric-badge">🤖</div>
    </div>
  </div>

  <div class="section-card fade-up-2">
    <div class="section-header">
      <div class="section-title"><span class="icon">🔧</span> Platform services</div>
      <button class="btn-ghost" style="font-size:12px;padding:6px 12px" onclick="checkHealth()">↻ Refresh</button>
    </div>
    <div class="section-body" style="padding:8px 24px">
      ${[
        {name:"Gateway",port:"8000",desc:"JWT auth · A/B routing · Rate limiting · CORS",status:hok?"healthy":"checking",color:"green"},
        {name:"Inference",port:"8001",desc:"PTU→PAYG fallback · Cost tracking · OTel metrics",status:"internal",color:"gray"},
        {name:"Prompt Registry",port:"8002",desc:"Semver versioning · Eval gate · Cosmos DB",status:"internal",color:"gray"},
        {name:"Eval Harness",port:"8003",desc:"CI quality gate · Blocks deploy if score < 0.85",status:"internal",color:"gray"},
      ].map(s=>`
        <div class="service-row">
          <div>
            <div class="service-name">${s.name}</div>
            <div class="service-desc">${s.desc}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-family:var(--mono);font-size:11px;color:var(--text3)">:${s.port}</span>
            <span class="badge badge-${s.color}">${s.status==="healthy"?"✓ healthy":s.status==="internal"?"internal":"…"}</span>
          </div>
        </div>`).join('')}
    </div>
  </div>

  <div class="section-card fade-up-3">
    <div class="section-header">
      <div class="section-title"><span class="icon">✦</span> Architecture highlights</div>
    </div>
    <div class="section-body">
      <div class="highlights">
        ${[
          {icon:"🔐",t:"JWT Auth + RBAC",d:"HS256 tokens · team_id + roles · Premium gating for GPT-4o"},
          {icon:"🎯",t:"Deterministic A/B",d:"MD5(experiment:user_id) bucketing · sticky sessions free"},
          {icon:"💸",t:"PTU → PAYG fallback",d:"Auto-fallback on 429 · ~50% cost saving at scale"},
          {icon:"📈",t:"Per-request cost tracking",d:"OTel counters · team chargeback · Cosmos DB audit trail"},
          {icon:"🚦",t:"Eval gate CI/CD",d:"Blocks deploy if relevance < 0.85 · GitHub Actions pipeline"},
          {icon:"⚡",t:"Scale to zero",d:"Container Apps minReplicas=0 · $0 cost when idle"},
        ].map(h=>`
          <div class="highlight">
            <div class="highlight-icon">${h.icon}</div>
            <div>
              <div class="highlight-title">${h.t}</div>
              <div class="highlight-desc">${h.d}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}

// ── CHAT ──────────────────────────────────────────────────────────────────────
function renderChat(){
  const models = ["gpt-4o-mini","gpt-4o","gpt-35-turbo"];
  return `
  <div class="fade-up" style="display:flex;flex-direction:column;height:calc(100vh - 160px)">
    <div class="section-card" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="section-header">
        <div class="section-title"><span class="icon">💬</span> Chat</div>
        <div style="display:flex;gap:6px;align-items:center">
          ${models.map(m=>`<button class="model-pill ${state.model===m?'active':''}" onclick="setModel('${m}')">${m}</button>`).join('')}
          <button class="btn-ghost" style="font-size:12px;padding:6px 12px;margin-left:4px" onclick="clearChat()">Clear</button>
        </div>
      </div>
      <div class="section-body" style="flex:1;overflow-y:auto;padding:20px" id="chat-area">
        ${state.messages.length===0?`
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3)">
            <div style="font-size:36px;opacity:.3">💬</div>
            <div style="font-size:14px">Send a message to test your live Azure deployment</div>
            <div style="font-family:var(--mono);font-size:11px">Model: ${state.model} · Endpoint: Azure Container Apps</div>
          </div>`:
          state.messages.map(m=>`
            <div class="msg-wrap ${m.role}" style="margin-bottom:12px">
              <div class="bubble ${m.role}">${escHtml(m.content)}</div>
            </div>`).join('')
        }
        ${state.loading?`<div style="margin-bottom:12px"><div class="typing"><span></span><span></span><span></span></div></div>`:''}
      </div>
      <div style="padding:16px 20px;border-top:1px solid var(--border)">
        ${state.stats?`<div class="chat-meta" style="margin-bottom:10px">
          <span>⚡ ${state.stats.total_tokens} tokens</span>
          <span>💰 $${((state.stats.prompt_tokens*0.00015+state.stats.completion_tokens*0.0006)/1000).toFixed(6)}</span>
          <span>🤖 ${state.stats.model||state.model}</span>
          <span>⏱ ${state.stats.latency||''}ms</span>
        </div>`:''}
        <div class="chat-input-row">
          <input id="chat-in" placeholder="Message — press Enter to send" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"/>
          <button class="btn-primary" onclick="sendChat()" style="white-space:nowrap;padding:10px 20px" ${state.loading?'disabled':''}>Send ↑</button>
        </div>
      </div>
    </div>
  </div>`;
}

function escHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") }

function setModel(m){ state.model=m; renderTab(); setTimeout(()=>{ const i=$("chat-in"); if(i)i.focus(); },50) }
function clearChat(){ state.messages=[]; state.stats=null; renderTab(); }

async function sendChat(){
  const inp=$("chat-in");
  const msg=inp?.value?.trim();
  if(!msg||state.loading)return;
  state.messages.push({role:"user",content:msg});
  inp.value="";
  state.loading=true;
  renderTab();
  scrollChatBottom();
  try{
    const history=state.messages.map(m=>({role:m.role,content:m.content}));
    const r=await fetch(`${GATEWAY}/v1/chat/completions`,{
      method:"POST",
      headers:{Authorization:`Bearer ${state.token}`,"Content-Type":"application/json"},
      body:JSON.stringify({messages:history,model:state.model})
    });
    const d=await r.json();
    if(d.choices?.[0]?.message){
      state.messages.push(d.choices[0].message);
      state.stats={...d.usage,model:d.model,latency:d.usage?.latency_checkpoint?.total_duration_ms||''};
      state.requests++;
      const pt=d.usage?.prompt_tokens||0, ct=d.usage?.completion_tokens||0;
      state.cost+=(pt*0.00015+ct*0.0006)/1000;
    }else{
      state.messages.push({role:"error",content:JSON.stringify(d.detail||d)});
    }
  }catch(e){
    state.messages.push({role:"error",content:"Request failed: "+e.message});
  }
  state.loading=false;
  renderTab();
  scrollChatBottom();
}

function scrollChatBottom(){
  setTimeout(()=>{ const a=$("chat-area"); if(a)a.scrollTop=a.scrollHeight; },50);
}

function copy(text, btn){
  navigator.clipboard.writeText(text);
  const orig=btn.textContent; btn.textContent="Copied!";
  setTimeout(()=>btn.textContent=orig,1500);
}

// ── HEALTH ────────────────────────────────────────────────────────────────────
async function checkHealth(){
  try{
    const r=await fetch(`${GATEWAY}/health`,{signal:AbortSignal.timeout(4000)});
    state.health=await r.json();
  }catch(e){ state.health={status:"error"} }
  const ok=state.health?.status==="ok";
  const dot=$("status-dot"); const txt=$("status-text");
  if(dot){ dot.style.background=ok?"var(--green)":"var(--red)"; dot.style.boxShadow=ok?"0 0 8px var(--green)":"0 0 8px var(--red)" }
  if(txt) txt.textContent=ok?"online":"offline";
  if(state.tab==="overview") renderTab();
}
